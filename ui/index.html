<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanji Quiz Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Antique&family=Noto+Serif+JP:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="overlay-root">

    <!-- Quiz container (hidden until triggered) -->
    <div id="quiz-container" class="hidden">

      <!-- Progress bar -->
      <div id="progress-bar">
        <div id="progress-fill"></div>
        <span id="progress-text">1 / 10</span>
      </div>

      <!-- Question area -->
      <div id="question-area">
        <div id="kanji-display">漢</div>
        <p id="reading-hint"></p>
      </div>

      <!-- Answer choices -->
      <div id="choices">
        <button class="choice-btn" data-index="0"></button>
        <button class="choice-btn" data-index="1"></button>
        <button class="choice-btn" data-index="2"></button>
        <button class="choice-btn" data-index="3"></button>
      </div>

      <!-- Feedback overlay -->
      <div id="feedback" class="hidden">
        <span id="feedback-icon"></span>
        <span id="feedback-text"></span>
      </div>
    </div>

    <!-- Results screen (hidden until quiz ends) -->
    <div id="results-screen" class="hidden">
      <h2>Results</h2>
      <div id="score-display"></div>
      <div id="results-list"></div>
      <p id="closing-msg">Closing in <span id="countdown">5</span>s…</p>
    </div>


  </div>

  <script src="kanji-data.js"></script>
  <script src="renshuu-api.js"></script>
  <script src="app.js"></script>
</body>
</html>
